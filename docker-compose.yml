version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flexiboard-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - flexiboard-network
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flexiboard-ui
    ports:
      - "3000:3000"
    networks:
      - flexiboard-network
    environment:
      - VITE_API_URL=http://backend:5000
    restart: unless-stopped

networks:
  flexiboard-network:
    driver: bridge
